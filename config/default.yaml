# Recommended default for the SEC Disclosure Intelligence Prototype.
# U.S.-aligned commercial stack: OpenAI for generation and embeddings, with a
# local/private fallback (Ollama + Nomic) for air-gapped deployments.
# Requires OPENAI_API_KEY. YAML needs pyyaml; default.json is equivalent.
#
# No training on user data. Cited evidence only. Refusal when retrieval
# confidence is weak. Official SEC EDGAR data sources only.

llm:
  provider: openai          # openai | anthropic | ollama | mock
  model: gpt-4.1-mini       # strong commercial generator (not a weak local model)
  api_key_env: OPENAI_API_KEY
  temperature: 0.0          # deterministic prompts
  max_tokens: 768
  seed: 7

embedding:
  provider: openai          # openai | nomic (local) | hashing (offline)
  model: text-embedding-3-large
  dim: 3072
  api_key_env: OPENAI_API_KEY
  normalize: true
  version: v1

# Local/private fallback for offline or FedRAMP-restricted environments.
local_fallback:
  enabled: true
  llm:
    provider: ollama
    model: gemma3:12b
  embedding:
    provider: nomic         # US-origin open embedding model
    model: nomic-ai/nomic-embed-text-v1.5
    dim: 768

chunking:
  max_chars: 1800
  overlap_chars: 200
  min_chars: 200
  sec_aware: true           # split on "Item N." section boundaries

retrieval:
  top_k: 8
  candidate_k: 40
  use_bm25: true
  use_dense: true
  fusion: rrf               # rrf | weighted
  rrf_k: 60
  bm25_weight: 0.5
  dense_weight: 0.5
  rerank: false
  reranker_model: cross-encoder/ms-marco-MiniLM-L-6-v2

generation:
  min_evidence_score: 0.05
  min_citations: 1
  abstain_below_confidence: 0.15   # refuse when evidence is weak
  max_context_chunks: 6
  quote_chars: 240

index:
  store: chroma             # memory | chroma
  path: data/sec_index
  collection: sec_filings

audit:
  enabled: true             # auditable: every retrieval/answer logged
  path: logs/audit.jsonl
